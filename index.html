<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JL Estofados</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --card: #161616;
    --border: rgba(255,255,255,0.07);
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --text: #f0ece4;
    --muted: #888;
    --btn-bg: rgba(201,168,76,0.08);
    --btn-hover: rgba(201,168,76,0.18);
    --radius: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
    color: var(--text);
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── LOGO ── */
  .logo-wrap {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    padding: 4px;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(201,168,76,0.25), 0 8px 32px rgba(0,0,0,0.5);
    animation: fadeDown 0.6s ease both;
  }

  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  /* ── NOME ── */
  .company-name {
    margin-top: 20px;
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
    text-align: center;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .tagline {
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: fadeDown 0.6s 0.15s ease both;
    text-align: center;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 22px 0;
    animation: fadeIn 0.6s 0.25s ease both;
  }

  /* ── SOCIAL ICONS ── */
  .socials {
    display: flex;
    gap: 14px;
    animation: fadeDown 0.6s 0.3s ease both;
    flex-wrap: wrap;
    justify-content: center;
  }

  .social-btn {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--btn-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--gold);
    position: relative;
    overflow: hidden;
    transition: all 0.25s ease;
  }

  .social-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--btn-hover);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .social-btn:hover::before { opacity: 1; }
  .social-btn:hover {
    border-color: var(--gold);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(201,168,76,0.2);
  }

  .social-btn svg {
    width: 22px;
    height: 22px;
    fill: currentColor;
    position: relative;
    z-index: 1;
  }

  /* ── LINK BUTTONS ── */
  .links {
    margin-top: 8px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 22px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--btn-bg);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.05), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  .link-btn:hover::before { transform: translateX(100%); }

  .link-btn:hover {
    border-color: var(--gold);
    background: var(--btn-hover);
    transform: translateX(4px);
    box-shadow: -4px 0 0 var(--gold), 0 8px 24px rgba(0,0,0,0.3);
  }

  .btn-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: rgba(201,168,76,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.25s;
  }

  .link-btn:hover .btn-icon { background: rgba(201,168,76,0.25); }
  .btn-icon svg { width: 18px; height: 18px; fill: var(--gold); }
  .btn-label { flex: 1; text-align: left; }

  .btn-arrow {
    color: var(--gold);
    font-size: 18px;
    opacity: 0.5;
    transition: opacity 0.25s, transform 0.25s;
  }

  .link-btn:hover .btn-arrow { opacity: 1; transform: translateX(4px); }

  .link-btn:nth-child(1) { animation: fadeUp 0.5s 0.4s ease both; }
  .link-btn:nth-child(2) { animation: fadeUp 0.5s 0.5s ease both; }
  .link-btn:nth-child(3) { animation: fadeUp 0.5s 0.6s ease both; }

  .footer {
    margin-top: 36px;
    font-size: 11px;
    color: rgba(136,136,136,0.4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    animation: fadeIn 0.6s 0.7s ease both;
    text-align: center;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
